name: linux.system.osinfo
display: OS Information
description: >
  System identification — /etc/os-release, hostname, kernel version, uptime,
  mounted filesystems, and loaded kernel modules.
platform: linux
type: composite
category: System Information
author: DFIR Engineering
version: "1.0.0"
deps: [ROOT]
size_mb: 1
time_sec: 5

sources:
  - type: file_pattern
    base: "/"
    globs:
      - "etc/os-release"
      - "etc/hostname"
      - "etc/machine-id"
      - "etc/timezone"
      - "proc/version"
      - "proc/cmdline"
      - "proc/uptime"
  - type: command
    cmd: uname
    args: ["-a"]
    output_file: uname.txt
    bash: true
  - type: command
    cmd: hostnamectl
    args: []
    output_file: hostnamectl.txt
    bash: true
  - type: command
    cmd: lsb_release
    args: ["-a"]
    output_file: lsb_release.txt
    bash: true
  - type: command
    cmd: df
    args: ["-h"]
    output_file: df.txt
    bash: true
  - type: command
    cmd: mount
    args: []
    output_file: mount.txt
    bash: true
  - type: command
    cmd: lsmod
    args: []
    output_file: lsmod.txt
    bash: true
