name: windows.execution.userassist
display: UserAssist
description: >
  GUI program launch counts and timestamps tracked by Windows Explorer in
  per-user NTUSER.DAT. ROT13 encoded program names. Proves user interaction
  with specific applications.
platform: windows
type: registry
category: Evidence of Execution
author: DFIR Engineering
version: "1.0.0"
deps: [ADMIN]
size_mb: 1
time_sec: 2

sources:
  - type: registry
    hives: ["HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\UserAssist"]
    method: reg_export
