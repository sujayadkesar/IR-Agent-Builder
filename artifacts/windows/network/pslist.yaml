name: windows.live.pslist
display: Process List
description: "tasklist /v /fo csv — current processes with users and window titles."
platform: windows
type: command
category: Live Network & System
author: DFIR Engineering
version: "1.0.0"
deps: [ADMIN]
size_mb: 1
time_sec: 3
sources:
  - type: command
    cmd: tasklist
    args: ["/v", "/fo", "csv"]
    output_file: tasklist.csv
    parse_format: csv
    timeout_sec: 30
